<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПАМЯТЬ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            background: white;
            border-radius: 10px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 2.0em;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            display: block;
        }

        .gallery-item-content {
            padding: 20px;
        }

        .gallery-item h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .gallery-item p {
            color: #666;
            font-size: 0.95em;
        }

        footer {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            color: #666;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ефим Аронский 1930-2026</h1>
            <p>יפים ארונסקי</p>
        </header>

        <section class="gallery">
            <div class="gallery-item">
                <img src="pic1/20220228_133747.jpg" alt="сад">
                <div class="gallery-item-content">
                </div>
            </div>

            <div class="gallery-item">
                <img src="pic1/IMG-20200305-WA0007.jpg" alt="3">
                <div class="gallery-item-content">
                </div>
            </div>

            <div class="gallery-item">
                <img src="pic1/P1067.jpg" alt="4">
                <div class="gallery-item-content">
                </div>
            </div>

            <div class="gallery-item">
                <img src="pic1/IMG_0024.jpg" alt="коньяк">
                <div class="gallery-item-content">
                </div>
            </div>

            <!-- div class="gallery-item">
                <img src="img/project5.jpg" alt="Project 5">
                <div class="gallery-item-content">
                    <h3>Project Five</h3>
                    <p>Collaborative work demonstrating teamwork and communication skills.</p>
                </div>
            </div !-->

        </section>

        <footer>
            <p>&copy; 2026 Pavel А.</p>
        </footer>
    </div>
</body>
</html>
